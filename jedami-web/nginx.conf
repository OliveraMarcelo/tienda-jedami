# ─── HTTP: redirigir todo a HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name jedamiapp.com www.jedamiapp.com;
    return 301 https://$host$request_uri;
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name jedamiapp.com www.jedamiapp.com;

    # Certificados Let's Encrypt montados desde el host vía volumen en docker-compose
    ssl_certificate     /etc/letsencrypt/live/jedamiapp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jedamiapp.com/privkey.pem;

    # Protocolos y cifrados modernos
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ─── DNS interno de Docker ────────────────────────────────────────────────
    resolver 127.0.0.11 valid=30s ipv6=off;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Archivos estáticos: caché agresiva ──────────────────────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Proxy al backend: API ────────────────────────────────────────────────
    location /api/ {
        set $upstream http://jedami-bff:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ─── Proxy al backend: uploads ───────────────────────────────────────────
    location /uploads/ {
        set $upstream http://jedami-bff:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── Vue Router (History Mode) ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Seguridad ───────────────────────────────────────────────────────────
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}
