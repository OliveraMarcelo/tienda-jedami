server {
    listen 80;
    server_name _;

    # ─── DNS interno de Docker ────────────────────────────────────────────────
    # 127.0.0.11 es el resolver embebido de Docker. Usarlo con una variable
    # en proxy_pass evita que nginx falle al iniciar si el upstream aún no
    # está listo (nginx resuelve hostnames en startup, no on-demand).
    resolver 127.0.0.11 valid=30s ipv6=off;

    # Directorio raíz con los archivos del build de Vite.
    root /usr/share/nginx/html;
    index index.html;

    # ─── Archivos estáticos: caché agresiva ──────────────────────────────────
    # Los assets de Vite tienen hash en el nombre (e.g. index.abc123.js),
    # por lo que son inmutables. Un año de caché es seguro.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Proxy al backend: API ────────────────────────────────────────────────
    # set $upstream hace que nginx resuelva el host en cada request (lazy),
    # no al iniciar. Necesario para que nginx arranque aunque el BFF aún no esté.
    location /api/ {
        set $upstream http://jedami-bff:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ─── Proxy al backend: uploads (imágenes de productos) ───────────────────
    location /uploads/ {
        set $upstream http://jedami-bff:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── Vue Router (History Mode) ────────────────────────────────────────────
    # Para todas las rutas que no sean archivos ni API, devolver index.html.
    # Vue Router se encarga de renderizar la vista correcta en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Seguridad básica ────────────────────────────────────────────────────
    # Ocultar la versión de nginx en headers de respuesta.
    server_tokens off;

    # Prevenir que el sitio sea embebido en iframes de otros dominios.
    add_header X-Frame-Options "SAMEORIGIN";

    # Evitar sniffing del content-type por parte del navegador.
    add_header X-Content-Type-Options "nosniff";
}
