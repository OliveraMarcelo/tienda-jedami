server {
    listen 80;
    server_name _;

    # Directorio raíz con los archivos del build de Vite.
    root /usr/share/nginx/html;
    index index.html;

    # ─── Archivos estáticos: caché agresiva ──────────────────────────────────
    # Los assets de Vite tienen hash en el nombre (e.g. index.abc123.js),
    # por lo que son inmutables. Un año de caché es seguro.
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|png|jpg|jpeg|webp|gif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Proxy al backend: API ────────────────────────────────────────────────
    # Todas las llamadas a /api/ se redirigen al contenedor jedami-bff.
    # El nombre "jedami-bff" es el service name definido en docker-compose.
    location /api/ {
        proxy_pass         http://jedami-bff:3000;
        proxy_http_version 1.1;

        # Headers necesarios para que Express conozca la IP real del cliente.
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts razonables para una API REST.
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
    }

    # ─── Proxy al backend: uploads (imágenes de productos) ───────────────────
    location /uploads/ {
        proxy_pass         http://jedami-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;

        # Caché de imágenes: 7 días (las URLs cambian si la imagen cambia).
        expires 7d;
        add_header Cache-Control "public";
    }

    # ─── Vue Router (History Mode) ────────────────────────────────────────────
    # Para todas las rutas que no sean archivos ni API, devolver index.html.
    # Vue Router se encarga de renderizar la vista correcta en el cliente.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Seguridad básica ────────────────────────────────────────────────────
    # Ocultar la versión de nginx en headers de respuesta.
    server_tokens off;

    # Prevenir que el sitio sea embebido en iframes de otros dominios.
    add_header X-Frame-Options "SAMEORIGIN";

    # Evitar sniffing del content-type por parte del navegador.
    add_header X-Content-Type-Options "nosniff";
}
