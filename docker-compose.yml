services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jedami
      POSTGRES_PASSWORD: jedami
      POSTGRES_DB: jedami_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jedami"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  jedami-bff:
    build:
      context: ./jedami-bff
      dockerfile: Dockerfile
    env_file:
      - ./jedami-bff/.env
    environment:
      # Override para usar hostnames de servicios dentro de docker
      DATABASE_URL: postgresql://jedami:jedami@postgres:5432/jedami_dev
      REDIS_URL: redis://redis:6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
