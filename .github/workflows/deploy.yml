name: Deploy a producción

on:
  push:
    branches: [main]

jobs:
  # ─── Gate: lint + build antes de deployar ────────────────────────────────
  ci:
    name: BFF — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jedami-bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: jedami-bff/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─── Build imágenes Docker y push a Docker Hub ───────────────────────────
  build-and-push:
    name: Build & Push → Docker Hub
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build y push jedami-bff
        uses: docker/build-push-action@v6
        with:
          context: ./jedami-bff
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jedami-bff:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jedami-bff:${{ github.sha }}

      - name: Build y push jedami-web
        uses: docker/build-push-action@v6
        with:
          context: ./jedami-web
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/jedami-web:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/jedami-web:${{ github.sha }}
          build-args: |
            VITE_API_URL=

  # ─── Deploy al Droplet vía SSH ────────────────────────────────────────────
  deploy:
    name: Deploy → DigitalOcean
    needs: [ci, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DOCKERHUB_USERNAME
          script: |
            cd /opt/jedami
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull jedami-bff jedami-web
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d jedami-bff jedami-web
            echo "Verificando salud del BFF..."
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T jedami-bff wget -qO- http://localhost:3000/api/v1/health || (echo "ERROR: BFF no responde" && exit 1)
            echo "Deploy exitoso"
            docker image prune -f
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
