name: Deploy a producción

on:
  push:
    branches: [main]

jobs:
  # ─── Gate: lint + build antes de deployar ────────────────────────────────
  ci:
    name: BFF — lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jedami-bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: jedami-bff/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─── Deploy al Droplet vía SSH ────────────────────────────────────────────
  deploy:
    name: Deploy → DigitalOcean
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/jedami
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build jedami-bff jedami-web
            docker image prune -f
            echo "Verificando salud del BFF..."
            sleep 15
            docker compose -f docker-compose.prod.yml exec -T jedami-bff wget -qO- http://localhost:3000/api/v1/health || (echo "ERROR: BFF no responde" && exit 1)
            echo "Deploy exitoso"
