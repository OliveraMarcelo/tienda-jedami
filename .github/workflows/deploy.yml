name: Deploy

on:
  push:
    branches: [main]

# Solo se ejecuta si el job de CI pasa (workflow_run) ó directamente en push.
# Usamos `needs` entre jobs dentro del mismo workflow para garantizar el orden.
jobs:
  # ─── CI gate ──────────────────────────────────────────────────────────────
  ci:
    name: CI gate (lint + type-check)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jedami-bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: jedami-bff/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  # ─── Build & push imagen Docker a GHCR ───────────────────────────────────
  build-and-push:
    name: Build BFF image → GHCR
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write         # necesario para pushear a ghcr.io

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./jedami-bff
          file: ./jedami-bff/Dockerfile
          push: true
          # Etiquetas: latest + SHA del commit para rollback
          tags: |
            ghcr.io/${{ github.repository_owner }}/jedami-bff:latest
            ghcr.io/${{ github.repository_owner }}/jedami-bff:${{ github.sha }}
          # Cache entre builds para acelerar
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Deploy en Render via Deploy Hook ─────────────────────────────────────
  deploy-render:
    name: Deploy BFF → Render
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s --fail-with-body \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -X POST
        # RENDER_DEPLOY_HOOK_URL se obtiene en:
        # Render Dashboard → jedami-bff service → Settings → Deploy Hook → copiar la URL
        # Guardarla como secret en GitHub → repo Settings → Secrets → RENDER_DEPLOY_HOOK_URL
