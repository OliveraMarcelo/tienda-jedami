name: CI

on:
  pull_request:
    branches: [main]

jobs:
  jedami-bff:
    name: jedami-bff — lint / type-check / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jedami-bff

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: jedami-bff/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run build
