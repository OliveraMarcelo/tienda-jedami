# STATUS DEFINITIONS:
# ==================
# Epic Status:
#   - backlog: Epic not yet started
#   - in-progress: Epic actively being worked on
#   - done: All stories in epic completed
#
# Story Status:
#   - backlog: Story only exists in epic file
#   - ready-for-dev: Story file created in stories folder
#   - in-progress: Developer actively working on implementation
#   - review: Ready for code review (via Dev's code-review workflow)
#   - done: Story completed
#
# TRACKS:
# =======
# Cada épica tiene stories de backend seguidas de sus correspondientes de frontend:
#   - BFF track:    stories del backend jedami-bff  (se implementan primero)
#   - WEB track:    stories del frontend jedami-web (se implementan DESPUÉS del BFF)
#   - MOBILE track: stories de la app admin jedami-mobile (se implementan DESPUÉS del BFF)
#
# FLUJO SECUENCIAL POR FEATURE:
#   1. Dev implementa la story BFF → API real disponible
#   2. Story WEB/MOBILE pasa a ready-for-dev → Dev consume el API real
#   No se usan mocks — el frontend siempre trabaja contra la API ya implementada
#
# Convención de keys:
#   X-N-descripcion         → BFF story (jedami-bff)
#   web-X-N-descripcion     → WEB story (jedami-web, depende del BFF correspondiente)
#   mobile-X-N-descripcion  → MOBILE story (jedami-mobile, depende del BFF correspondiente)

